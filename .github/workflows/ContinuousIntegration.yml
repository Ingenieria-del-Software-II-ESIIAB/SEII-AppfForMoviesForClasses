# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "ElenaNavarro-CI" ]
  pull_request:
    branches: [ "ElenaNavarro-CI" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        projects_to_compile: ['src/AppForSEII2526.API', 'src/AppForSEII2526.Web', 'test/AppForSEII2526.UT', 'test/AppForSEII2526.UIT']
        project_for_UT: ['test/AppForSEII2526.UT/AppForSEII2526.UT.csproj']

    steps:
      - name: Check out repository code 
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'
          
      - name: Restore dependencies        
        run: dotnet restore ${{ matrix.projects_to_compile }} 

      - name: Build the solution
        run: dotnet build ${{ matrix.projects_to_compile }}  --configuration Release --no-restore

      - name: Run unit tests with report
        run: dotnet test ${{ matrix.project_for_UT }} --configuration Release --no-build --logger "trx;LogFileName=TestResults.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: ./test/AppForSEII2526.UT/TestResults/TestResults.trx

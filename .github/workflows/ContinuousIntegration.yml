# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "ElenaNavarro-CI" ]
  pull_request:
    branches: [ "ElenaNavarro-CI" ]

jobs:
  build:

    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code 
        uses: actions/checkout@v2

      - name: Set up .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.x'
        env:
          NUGET_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}
          
      - name: Restore dependencies
        run: dotnet restore ./AppForSEII2526.sln

      - name: Build the solution
        run: dotnet build ./AppForSEII2526.sln --configuration Release --no-restore

      - name: Run unit tests with report
        run: dotnet test ./test/AppForSEII2526.UT/AppForSEII2526.UT.csproj --configuration Release --no-build --logger "trx;LogFileName=TestResults.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: ./test/AppForSEII2526.UT/TestResults/TestResults.trx
